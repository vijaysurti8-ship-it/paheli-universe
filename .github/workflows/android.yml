name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git zip unzip openjdk-17-jdk \
        autoconf libtool pkg-config zlib1g-dev libgl1-mesa-dev \
        libgles2-mesa-dev python3-pip python3-setuptools

    - name: Install Buildozer and Cython
      run: |
        pip3 install --upgrade pip
        pip3 install --upgrade buildozer cython virtualenv

    - name: Set up Android SDK & NDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools: 33.0.2
        ndk-version: 25.2.9519653

    - name: Build with Buildozer
      run: |
        mkdir -p ~/.ccache
        # Agar spec file kisi sub-folder me hai toh ye script wahan jaakar build karegi
        SPEC_PATH=$(find . -name "buildozer.spec" -print -quit)
        if [ -n "$SPEC_PATH" ]; then
          cd "$(dirname "$SPEC_PATH")"
          echo "Found buildozer.spec in $(pwd)"
          buildozer android debug
        else
          echo "ERROR: buildozer.spec file aapki repository me kahin nahi mili!"
          exit 1
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package-apk
        path: |
          **/bin/*.apk
