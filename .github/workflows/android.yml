name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev

    - name: Install Pip Packages
      run: |
        pip install --upgrade Cython==0.29.36 buildozer virtualenv

    - name: Create Buildozer Spec and Build
      run: |
        echo "[app]" > buildozer.spec
        echo "title = Mega Paheli Universe" >> buildozer.spec
        echo "package.name = megapaheliuniverse" >> buildozer.spec
        echo "package.domain = com.paheli.universe" >> buildozer.spec
        echo "source.dir = ." >> buildozer.spec
        echo "source.include_exts = py,png,jpg,kv,atlas,mp3,wav,json" >> buildozer.spec
        echo "requirements = python3,pygame,sdl2_image,sdl2_mixer,sdl2_ttf" >> buildozer.spec
        echo "version = 1.0" >> buildozer.spec
        echo "orientation = landscape" >> buildozer.spec
        echo "fullscreen = 1" >> buildozer.spec
        echo "android.api = 33" >> buildozer.spec
        echo "android.minapi = 24" >> buildozer.spec
        echo "android.ndk_api = 21" >> buildozer.spec
        echo "android.private_storage = True" >> buildozer.spec
        echo "android.accept_apk_terms = True" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "[buildozer]" >> buildozer.spec
        echo "log_level = 2" >> buildozer.spec
        echo "warn_on_root = 0" >> buildozer.spec
        export BUILDOZER_WARN_ON_ROOT=0
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Paheli-Universe-APK
        path: bin/*.apk
        
