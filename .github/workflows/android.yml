name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git zip unzip openjdk-17-jdk \
        autoconf libtool pkg-config zlib1g-dev libgl1-mesa-dev \
        libgles2-mesa-dev python3-pip python3-setuptools

    - name: Install Buildozer and Cython
      run: |
        pip3 install --upgrade pip
        pip3 install --upgrade buildozer cython virtualenv

    # GitHub automatic NDK download karega jo fail nahi hota
    - name: Set up Android SDK & NDK
      id: setup-android
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools: 33.0.2
        ndk-version: 25.2.9519653

    - name: Build with Buildozer
      run: |
        mkdir -p ~/.ccache
        # GitHub ke download kiye NDK ka path use karne ke liye forcefully command dena
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653
        buildozer android debug
        
